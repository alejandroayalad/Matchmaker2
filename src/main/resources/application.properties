spring.application.name=botjobhunter
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/botjobhunter}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:botjobhunter}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:botjobhunter}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

mail.enabled=${MAIL_ENABLED:false}
mail.imaps.host=${MAIL_IMAPS_HOST:imap.gmail.com}
mail.imaps.port=${MAIL_IMAPS_PORT:993}
mail.imaps.username=${MAIL_IMAPS_USERNAME:}
mail.imaps.password=${MAIL_IMAPS_PASSWORD:}
mail.imaps.ssl-enable=${MAIL_IMAPS_SSL_ENABLE:true}
mail.imaps.folder=${MAIL_IMAPS_FOLDER:INBOX}
mail.cleanup.strategy=${MAIL_CLEANUP_STRATEGY:NONE}
mail.cleanup.label=${MAIL_CLEANUP_LABEL:BotJobHunter/Processed}
