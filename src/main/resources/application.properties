spring.application.name=botjobhunter
spring.datasource.url=jdbc:h2:mem:jobhunter
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

mail.enabled=false
mail.imaps.host=${MAIL_IMAPS_HOST:imap.gmail.com}
mail.imaps.port=${MAIL_IMAPS_PORT:993}
mail.imaps.username=${MAIL_IMAPS_USERNAME:}
mail.imaps.password=${MAIL_IMAPS_PASSWORD:}
mail.imaps.ssl-enable=${MAIL_IMAPS_SSL_ENABLE:true}
mail.imaps.folder=${MAIL_IMAPS_FOLDER:INBOX}
mail.cleanup.strategy=${MAIL_CLEANUP_STRATEGY:NONE}
mail.cleanup.label=${MAIL_CLEANUP_LABEL:BotJobHunter/Processed}
